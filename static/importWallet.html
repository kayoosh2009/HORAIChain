<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Import Wallet - HoraiWallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --color-main: #312F2C;
            --color-light: #FAFAFA;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: var(--color-main);
            color: var(--color-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }

        .header { margin-bottom: 30px; }
        .title { font-size: 32px; font-weight: 800; }
        .subtitle { font-size: 14px; opacity: 0.6; margin-top: 8px; }

        .input-area {
            background: rgba(250, 250, 250, 0.05);
            border: 1.5px solid rgba(250, 250, 250, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: none;
            color: var(--color-light);
            font-size: 16px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        textarea::placeholder { color: rgba(250, 250, 250, 0.2); }

        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            text-transform: uppercase;
            margin-top: auto;
        }

        .btn-import { background: var(--color-light); color: var(--color-main); }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">Import Wallet</h1>
        <p class="subtitle">Enter your 12-word recovery phrase to restore access to your HORAI account.</p>
    </div>

    <div class="input-area">
        <textarea id="phraseInput" placeholder="word1 word2 word3..." spellcheck="false"></textarea>
    </div>
    
    <div id="error" class="error-msg">Invalid seed phrase. Try again.</div>

    <button class="btn btn-import" id="importBtn" onclick="handleImport()">Restore Wallet</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        /**
         * Секретная функция сохранения сессии
         * Записывает адрес в локальное хранилище браузера
         */
        function saveSession(address) {
            if (address) {
                localStorage.setItem('horai_address', address);
                console.log("Session saved for address:", address);
            }
        }

        /**
         * Обработка импорта фразы
         */
        async function handleImport() {
            const phraseInput = document.getElementById('phraseInput');
            const phrase = phraseInput.value.trim();
            const btn = document.getElementById('importBtn');
            const errorEl = document.getElementById('error');

            // Базовая проверка на пустоту
            if (!phrase) {
                tg.HapticFeedback.notificationOccurred('warning');
                return;
            }

            // Визуальная индикация загрузки
            btn.disabled = true;
            btn.innerText = "Verifying...";
            errorEl.style.display = 'none';

            try {
                // Отправляем POST-запрос на твой Rust бэкенд
                const response = await fetch('/api/wallet/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phrase: phrase })
                });

                if (!response.ok) throw new Error('Server connection error');

                const data = await response.json();

                if (data.status === "success") {
                    // Если Rust подтвердил валидность фразы
                    tg.HapticFeedback.notificationOccurred('success');
                    
                    // ВЫПОЛНЯЕМ СОХРАНЕНИЕ ВХОДА
                    saveSession(data.address);
                    
                    // Переходим в основной интерфейс
                    window.location.href = "mainWallet.html";
                } else {
                    // Если бэкенд вернул ошибку (например, фраза невалидна)
                    throw new Error(data.message || "Invalid seed phrase");
                }
            } catch (err) {
                // Обработка ошибок
                tg.HapticFeedback.notificationOccurred('error');
                errorEl.innerText = err.message;
                errorEl.style.display = 'block';
                
                // Возвращаем кнопку в рабочее состояние
                btn.disabled = false;
                btn.innerText = "Restore Wallet";
            }
        }

        // Добавляем поддержку Enter для удобства
        document.getElementById('phraseInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleImport();
            }
        });
    </script>
</body>
</html>
